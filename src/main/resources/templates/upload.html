<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Subir Plantilla Word</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 { color: #333; margin-bottom: 20px; }
        input[type="file"] { margin-bottom: 20px; }

        button {
            background-color: #007BFF; color: white;
            border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; font-size: 16px;
        }

        button:hover { background-color: #0056b3; }

        /* Estilos para el mensaje de carga */
        #cargando {
            display: none;
            margin-top: 20px;
            color: #d9534f;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Sube tu Convenio (Word)</h1>
        <p>Selecciona el documento con los campos a rellenar.</p>

        <form th:action="@{/procesar-word}" method="post" enctype="multipart/form-data" onsubmit="mostrarCarga()">
            <input type="file" name="archivo" accept=".docx" required>
            <br>
            <button type="submit" id="btnSubir">Procesar Documento</button>
        </form>

        <div id="cargando">
            ⏳ Procesando el documento... (puede tardar unos segundos la primera vez)
        </div>
    </div>

    <script>
        function mostrarCarga() {
            document.getElementById('btnSubir').style.display = 'none';
            document.getElementById('cargando').style.display = 'block';
        }
    </script>
</body>
</html>
